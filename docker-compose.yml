version: '3.8'

services:
  retino-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: retino-dev
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/models
      - ./experiments:/app/experiments
    ports:
      - "8888:8888"
      - "5000:5000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - KAGGLE_USERNAME=desareca
      - KAGGLE_API_TOKEN=KGAT_03b1eeb39efbaf1b25a8d2095a56db0e
    stdin_open: true
    tty: true